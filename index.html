<html lang="ko" data-theme="dark">
<head>

    [data-theme="dark"]{--bg:#07111f;--bg2:#0c1826;--card:#101e30;--card2:#162438;--border:#1b2c42;--text1:#ddeaff;--text2:#7a92b4;--text3:#405470;--accent:#4f8cff;--accbg:rgba(79,140,255,.1);--green:#00c896;--greenbg:rgba(0,200,150,.1);--red:#ff4d5e;--redbg:rgba(255,77,94,.1);--nav:rgba(10,20,36,.92);--ticker:#09192a;--shadow:0 2px 16px rgba(0,0,0,.4);--shover:0 4px 20px rgba(79,140,255,.18)}

    :root{--mono:'IBM Plex Mono',monospace;--sans:'Pretendard',-apple-system,sans-serif}

    .ticker{background:var(--ticker);border-bottom:1px solid var(--border);height:34px;overflow:hidden}
    .ticker-rail{display:flex;gap:52px;animation:roll 90s linear infinite;white-space:nowrap;height:100%;align-items:center;width:max-content}
    .ticker:hover .ticker-rail{animation-play-state:paused}
    @keyframes roll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .tk{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px}
    .tk-nm{color:var(--text2);font-weight:500}.tk-px{color:var(--text1);font-weight:600}
    .up{color:var(--green)}.dn{color:var(--red)}
    nav{position:sticky;top:0;z-index:200;background:var(--nav);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:60px;padding:0 28px;display:flex;align-items:center;gap:14px;transition:background .4s}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
    .logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#4f8cff,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 12px rgba(79,140,255,.35)}
    .logo-nm{font-size:17px;font-weight:700;color:var(--text1);letter-spacing:-.4px}
    .sbox{flex:1;max-width:500px;position:relative}
    .sinp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px 8px 38px;font-family:var(--sans);font-size:13.5px;color:var(--text1);outline:none;transition:border-color .2s,box-shadow .2s}
    .sinp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accbg)}
    .sinp::placeholder{color:var(--text3)}
    .sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
    .sdrop{position:absolute;top:calc(100%+6px);left:0;right:0;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;display:none;z-index:400;overflow:hidden;box-shadow:var(--shadow);max-height:380px;overflow-y:auto}
    .sdrop.on{display:block}
    .sdrop-label{padding:8px 14px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
    .sitem{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
    .sitem:last-child{border-bottom:none}
    .sitem:hover{background:var(--accbg)}
    .si-nm{font-size:13.5px;font-weight:600;margin-bottom:2px}.si-sym{font-size:11px;font-family:var(--mono);color:var(--text3)}
    .mpills{display:flex;gap:7px;flex-shrink:0}
    .mpill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11.5px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--text2);white-space:nowrap}
    .mpill.open{border-color:var(--green);background:var(--greenbg);color:var(--green)}
    .mpill.closed{color:var(--text3)}
    .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .mpill.open .dot{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .nav-clock{font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap;margin-left:auto}
    .wrap{max-width:1280px;margin:0 auto;padding:28px 24px}
    .ad{background:var(--card);border:1.5px dashed var(--border);border-radius:12px;padding:16px;text-align:center;color:var(--text3);font-size:12px;margin-bottom:28px}
    .slabel{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:12px}
    .mkt-top{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:32px}
    .mkt-idx{flex:1;min-width:0}
    .idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
    .idx-card{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:16px;cursor:pointer;transition:all .2s}
    .idx-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shover)}
    .idx-nm{font-size:13.5px;font-weight:700;margin-bottom:8px}
    .idx-px{font-family:var(--mono);font-size:21px;font-weight:700;margin-bottom:5px;letter-spacing:-.5px}
    .idx-ch{font-family:var(--mono);font-size:12px;font-weight:600;display:flex;gap:5px}
    .temp-box{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:20px 22px;min-width:220px}
    .temp-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .temp-gauge{position:relative;height:10px;border-radius:5px;background:linear-gradient(to right,#4f8cff,#8899b5,#00c896);margin-bottom:10px}
    .temp-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;background:var(--text1);border-radius:50%;border:3px solid var(--bg2);box-shadow:0 2px 8px rgba(0,0,0,.3);transition:left .8s cubic-bezier(.34,1.56,.64,1)}
    .temp-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px}
    .temp-val{font-family:var(--mono);font-size:26px;font-weight:700;margin-bottom:4px}
    .temp-desc{font-size:13px;color:var(--text2);margin-bottom:14px}
    .stk-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
    .tabs{display:flex;gap:4px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:4px}
    .tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:none;font-family:var(--sans);transition:all .15s}
    .tab.on{background:var(--accent);color:#fff}
    .tab:hover:not(.on){background:var(--card2);color:var(--text1)}
    .refbtn{background:var(--card);border:1.5px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--sans);transition:all .15s}
    .refbtn:hover{background:var(--card2);color:var(--text1)}
    .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .sk{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:18px;cursor:pointer;display:flex;flex-direction:column;gap:13px;transition:all .2s}
    .sk:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shover)}
    .sk-top{display:flex;justify-content:space-between;align-items:flex-start}
    .sk-nm{font-size:14.5px;font-weight:700;margin-bottom:3px}
    .sk-sym{font-family:var(--mono);font-size:11px;color:var(--text3)}
    .badge{font-size:10px;padding:3px 7px;border-radius:5px;font-family:var(--mono);font-weight:700;letter-spacing:.3px}
    .badge-kr{background:var(--greenbg);color:var(--green)}
    .badge-us{background:var(--accbg);color:var(--accent)}
    .sk-mid{display:flex;justify-content:space-between;align-items:flex-end}
    .sk-px{font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:-.5px}
    .sk-right{text-align:right}
    .sk-pct{font-family:var(--mono);font-size:15px;font-weight:700;display:flex;align-items:center;gap:3px;justify-content:flex-end}
    .sk-abs{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:2px}
    .sk-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .sk-fill{height:100%;border-radius:2px;transition:width .7s}
    .sk-vol{font-size:11px;color:var(--text3);font-family:var(--mono)}
    .bone{background:linear-gradient(90deg,var(--card)25%,var(--card2)50%,var(--card)75%);background-size:200%;animation:shim 1.5s infinite;border-radius:5px}
    @keyframes shim{0%{background-position:200%}100%{background-position:-200%}}
    footer{background:var(--bg2);border-top:1px solid var(--border);padding:28px 24px;text-align:center;margin-top:60px}
    .ft{font-size:11.5px;color:var(--text3);line-height:2}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    @media(max-width:768px){nav{padding:0 16px}.mpills{display:none}.wrap{padding:18px 16px}.mkt-top{flex-direction:column}.temp-box{min-width:unset;width:100%}.idx-grid{grid-template-columns:repeat(2,1fr)}.sgrid{grid-template-columns:repeat(2,1fr)}}

</head>

const STOCKS={
  kr:[{s:'005930.KS',n:'삼성전자'},{s:'000660.KS',n:'SK하이닉스'},{s:'373220.KS',n:'LG에너지솔루션'},{s:'207940.KS',n:'삼성바이오로직스'},{s:'005380.KS',n:'현대차'},{s:'035420.KS',n:'NAVER'},{s:'035720.KS',n:'카카오'},{s:'000270.KS',n:'기아'},{s:'006400.KS',n:'삼성SDI'},{s:'105560.KS',n:'KB금융'},{s:'068270.KS',n:'셀트리온'},{s:'055550.KS',n:'신한지주'}],
  us:[{s:'AAPL',n:'Apple'},{s:'MSFT',n:'Microsoft'},{s:'NVDA',n:'NVIDIA'},{s:'AMZN',n:'Amazon'},{s:'GOOGL',n:'Alphabet'},{s:'TSLA',n:'Tesla'},{s:'META',n:'Meta'},{s:'AVGO',n:'Broadcom'},{s:'JPM',n:'JPMorgan'},{s:'LLY',n:'Eli Lilly'},{s:'V',n:'Visa'},{s:'UNH',n:'UnitedHealth'}]
};
const IDX=[{s:'^KS11',n:'KOSPI',f:'🇰🇷'},{s:'^KQ11',n:'KOSDAQ',f:'🇰🇷'},{s:'^GSPC',n:'S&P 500',f:'🇺🇸'},{s:'^IXIC',n:'NASDAQ',f:'🇺🇸'},{s:'^DJI',n:'다우존스',f:'🇺🇸'}];
let curTab='kr',cache={};

function fPx(p,cur,sym){if(p==null||isNaN(p))return'--';if(sym?.startsWith('^'))return p.toLocaleString('ko-KR',{maximumFractionDigits:2});if(cur==='KRW')return p.toLocaleString('ko-KR')+'원';return'$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fVol(v){if(!v)return'--';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return''+v;}
function isKrOpen(){const k=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));const d=k.getDay(),t=k.getHours()*60+k.getMinutes();return d>=1&&d<=5&&t>=540&&t<930;}
function isUsOpen(){const e=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));const d=e.getDay(),t=e.getHours()*60+e.getMinutes();return d>=1&&d<=5&&t>=570&&t<960;}
function updClock(){
  const k=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  document.getElementById('navClock').textContent=k.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' KST';
  ['KR','US'].forEach(x=>{const el=document.getElementById('pill'+x);const on=x==='KR'?isKrOpen():isUsOpen();el.className='mpill'+(on?' open':' closed');el.innerHTML=`<span class="dot"></span>${x==='KR'?'🇰🇷 한국':'🇺🇸 미국'} ${on?'장중':'장마감'}`;});
}
setInterval(updClock,1000);updClock();
async function fetchQ(sym){if(cache[sym]&&Date.now()-cache[sym].t<60000)return cache[sym].d;try{const r=await fetch('/api/quote?symbol='+encodeURIComponent(sym));const d=await r.json();cache[sym]={d,t:Date.now()};return d;}catch{return null;}}
function goStock(sym,nm){window.location.href=`stock.html?s=${encodeURIComponent(sym)}&n=${encodeURIComponent(nm)}`;}
async function loadMkt(){
  const d=await(async()=>{try{const r=await fetch('/api/market');return r.json();}catch{return null;}})();
  if(!d)return;
  document.getElementById('idxGrid').innerHTML=d.map(item=>{
    const idx=IDX.find(i=>i.s===item.symbol)||{n:item.symbol,f:''};
    const up=(item.change||0)>=0;
    const pFmt=item.price?.toLocaleString('ko-KR',{maximumFractionDigits:2});
    return`<div class="idx-card" onclick="goStock('${item.symbol}','${idx.n}')"><div class="idx-nm">${idx.f} ${idx.n}</div><div class="idx-px">${pFmt||'--'}</div><div class="idx-ch ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(item.changePercent||0).toFixed(2)}%</div></div>`;
  }).join('');
  const valid=d.filter(i=>i.changePercent!=null);
  if(valid.length){
    const avg=valid.reduce((s,i)=>s+i.changePercent,0)/valid.length;
    const pct=Math.min(100,Math.max(0,50+avg*12));
    document.getElementById('tempNeedle').style.left=pct+'%';
    const tv=document.getElementById('tempVal'),td=document.getElementById('tempDesc');
    if(avg<=-2){tv.className='temp-val dn';tv.textContent='❄️ 침체';td.textContent='시장이 크게 하락 중';}
    else if(avg<=-0.5){tv.className='temp-val dn';tv.textContent='🔵 냉각';td.textContent='전반적 하락세';}
    else if(avg<=0.5){tv.className='temp-val';tv.style.color='var(--text2)';tv.textContent='⚪ 중립';td.textContent='보합 흐름';}
    else if(avg<=2){tv.className='temp-val up';tv.textContent='🟢 상승';td.textContent='전반적 상승세';}
    else{tv.className='temp-val up';tv.textContent='🔥 과열';td.textContent='시장이 크게 상승 중';}
  }
  const html=d.map(item=>{const idx=IDX.find(i=>i.s===item.symbol)||{n:item.symbol};const up=(item.change||0)>=0;const p=item.price?.toLocaleString('ko-KR',{maximumFractionDigits:2})||'--';return`<div class="tk"><span class="tk-nm">${idx.n}</span><span class="tk-px">${p}</span><span class="tk-ch ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(item.changePercent||0).toFixed(2)}%</span></div>`;}).join('');
  document.getElementById('tickerRail').innerHTML=html+html;
}
function switchTab(t){curTab=t;['kr','us'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('on',x===t));loadStocks(t);}
async function loadStocks(t){
  const grid=document.getElementById('sgrid'),list=STOCKS[t];
  grid.innerHTML=list.map(()=>`<div class="sk" style="pointer-events:none"><div class="sk-top"><div><div class="bone" style="height:15px;width:110px;margin-bottom:6px"></div><div class="bone" style="height:11px;width:70px"></div></div><div class="bone" style="height:18px;width:28px;border-radius:5px"></div></div><div class="sk-mid"><div class="bone" style="height:22px;width:95px"></div><div><div class="bone" style="height:15px;width:60px;margin-bottom:5px"></div><div class="bone" style="height:11px;width:44px"></div></div></div><div class="bone" style="height:3px;width:100%"></div><div class="bone" style="height:11px;width:80px"></div></div>`).join('');
  const quotes=await Promise.all(list.map(s=>fetchQ(s.s)));
  grid.innerHTML=list.map((stk,i)=>{
    const meta=quotes[i]?.chart?.result?.[0]?.meta;
    const cur=meta?.currency,p=meta?.regularMarketPrice,pc=meta?.previousClose||meta?.chartPreviousClose,ch=p-pc,chp=pc?(ch/pc)*100:0,up=ch>=0;
    if(!meta)return`<div class="sk" onclick="goStock('${stk.s}','${stk.n}')"><div class="sk-top"><div><div class="sk-nm">${stk.n}</div><div class="sk-sym">${stk.s}</div></div><span class="badge badge-${t}">${t.toUpperCase()}</span></div><div style="font-size:12px;color:var(--text3)">데이터 오류</div></div>`;
    const bar=Math.min(Math.abs(chp)*6,100),absStr=cur==='KRW'?(up?'+':'')+ch.toLocaleString('ko-KR')+'원':(up?'+$':'-$')+Math.abs(ch).toFixed(2);
    return`<div class="sk" onclick="goStock('${stk.s}','${stk.n.replace(/'/g,"\\'")}')"><div class="sk-top"><div><div class="sk-nm">${stk.n}</div><div class="sk-sym">${stk.s}</div></div><span class="badge badge-${t}">${t.toUpperCase()}</span></div><div class="sk-mid"><div class="sk-px">${fPx(p,cur,stk.s)}</div><div class="sk-right"><div class="sk-pct ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(chp).toFixed(2)}%</div><div class="sk-abs">${absStr}</div></div></div><div class="sk-bar"><div class="sk-fill" style="width:${bar}%;background:${up?'var(--green)':'var(--red)'}"></div></div><div class="sk-vol">거래량 ${fVol(meta.regularMarketVolume)}</div></div>`;
  }).join('');
}
function doRefresh(){STOCKS[curTab].forEach(s=>delete cache[s.s]);loadStocks(curTab);}

// ── 검색 ──
const MAIN_EX=['NMS','NGM','NYQ','PCX','KSC','KOE','NAS','ASE'];
function localSearch(q){
  if(!q)return[];
  const ql=q.toLowerCase();
  const seen=new Set();
  return DICT.filter(d=>{
    if(seen.has(d.s))return false;
    const match=d.kr?.includes(q)||d.en?.toLowerCase().includes(ql)||d.s?.toUpperCase().startsWith(q.toUpperCase());
    if(match)seen.add(d.s);
    return match;
  }).slice(0,5);
}
let stmr=null;
document.getElementById('sinp').addEventListener('input',async function(){
  clearTimeout(stmr);
  const q=this.value.trim(),drop=document.getElementById('sdrop');
  if(q.length<1){drop.classList.remove('on');return;}
  stmr=setTimeout(async()=>{
    const local=localSearch(q);
    let extra=[];
    try{
      const r=await fetch('/api/search?q='+encodeURIComponent(q));
      const d=await r.json();
      const seen=new Set(local.map(x=>x.s));
      extra=(d?.quotes||[]).filter(r=>MAIN_EX.includes(r.exchange)&&r.quoteType==='EQUITY'&&!seen.has(r.symbol)).map(r=>{
        let t='us';
        if(r.symbol?.endsWith('.KS')||r.symbol?.endsWith('.KQ'))t='kr';
        return{s:r.symbol,n:r.shortname||r.longname||r.symbol,t,ex:r.exchange};
      }).slice(0,4);
    }catch{}
    const all=[...local,...extra].slice(0,8);
    if(!all.length){drop.classList.remove('on');return;}
    drop.innerHTML=(local.length?`<div class="sdrop-label">검색 결과</div>`:'')+all.map(d=>`<div class="sitem" onclick="goStock('${d.s}','${(d.n||d.kr||d.s).replace(/'/g,"\\'")}');document.getElementById('sdrop').classList.remove('on');document.getElementById('sinp').value=''"><div><div class="si-nm">${d.n||d.kr}</div><div class="si-sym">${d.s}${d.ex?' · '+d.ex:''}</div></div><span class="badge badge-${d.t}">${d.t.toUpperCase()}</span></div>`).join('');
    drop.classList.add('on');
  },250);
});
document.addEventListener('click',e=>{if(!e.target.closest('.sbox'))document.getElementById('sdrop').classList.remove('on');});
loadMkt();loadStocks('kr');
</script>
</body>
